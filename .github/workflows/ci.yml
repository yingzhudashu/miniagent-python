name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,typing]"

      - name: Compileall (syntax check)
        run: python -m compileall -q miniagent

      - name: Ruff
        run: python -m ruff check miniagent tests scripts

      - name: Documentation and docstring contracts
        run: |
          python scripts/check_docs.py
          python scripts/docstring_inventory.py --check

      - name: Bandit high-severity security scan
        run: python -m bandit -q -r miniagent -x miniagent/assistant/skills/templates -lll

      - name: Architecture dependency rules
        run: |
          python scripts/check_architecture.py
          python scripts/check_current_version.py

      - name: Mypy (entire package, including untyped bodies)
        run: python -m mypy miniagent

      - name: Build and inspect wheel runtime resources
        if: matrix.python-version == '3.12'
        run: |
          python -m pip wheel . --no-deps --wheel-dir wheelhouse
          python scripts/check_wheel_resources.py wheelhouse/*.whl

      - name: Pytest
        run: python -m pytest

      - name: Branch coverage baseline
        if: matrix.python-version == '3.12'
        run: python -m pytest --cov=miniagent --cov-branch --cov-report=xml --cov-fail-under=80

      - name: Changed-line coverage
        if: matrix.python-version == '3.12' && github.event_name == 'pull_request'
        run: diff-cover coverage.xml --fail-under=95 --compare-branch=origin/${{ github.base_ref }}

  test-feishu-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with Feishu extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,feishu]"

      - name: Compileall (syntax check)
        run: python -m compileall -q miniagent

      - name: Ruff
        run: python -m ruff check miniagent tests

      - name: Pytest
        run: python -m pytest

  test-mcp-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with MCP extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Smoke import MCP SDK
        run: python -c "from mcp import ClientSession, StdioServerParameters; from mcp.client.stdio import stdio_client"

      - name: Compileall (syntax check)
        run: python -m compileall -q miniagent

      - name: Ruff
        run: python -m ruff check miniagent tests

      - name: Pytest
        run: python -m pytest

  test-provider-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install optional provider SDKs
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,providers]"

      - name: Smoke import provider SDKs
        run: python -c "import anthropic; from google import genai"

      - name: Compileall and Ruff
        run: |
          python -m compileall -q miniagent
          python -m ruff check miniagent tests

      - name: Pytest
        run: python -m pytest

  test-browser-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install browser extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,browser]"

      - name: Smoke import browser SDK and run offline contracts
        run: |
          python -c "from playwright.async_api import async_playwright"
          python -m pytest tests/tools/test_browser_pool.py tests/tools/test_web_search_browser.py

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core and CLI extras
        run: python -m pip install -e ".[dev,cli]"
      - name: Windows entrypoint and platform tests
        run: |
          python -m miniagent --help
          python -m pytest tests/cli/test_cli_entry.py tests/cli/test_clipboard.py tests/session/test_session_lock.py

  macos-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install core and CLI extras
        run: python -m pip install -e ".[dev,cli]"
      - name: macOS entrypoint and platform tests
        run: |
          python -m miniagent --help
          python -m pytest tests/cli/test_cli_entry.py tests/session/test_session_lock.py tests/runtime/test_instance_manager.py
