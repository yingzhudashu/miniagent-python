name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,typing]"

      - name: Compileall (syntax check)
        run: python -m compileall -q miniagent

      - name: Ruff
        run: python -m ruff check miniagent tests scripts/check_architecture.py scripts/check_wheel_resources.py

      - name: Architecture dependency rules
        run: python scripts/check_architecture.py

      - name: Mypy (application + bootstrap + contracts + types)
        run: python -m mypy miniagent/application miniagent/bootstrap miniagent/contracts miniagent/types

      - name: Build and inspect wheel runtime resources
        if: matrix.python-version == '3.12'
        run: |
          python -m pip wheel . --no-deps --wheel-dir wheelhouse
          python scripts/check_wheel_resources.py wheelhouse/*.whl

      - name: Pytest
        run: python -m pytest tests/ -q -m "not evaluation"

  test-feishu-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with Feishu extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,feishu]"

      - name: Compileall (syntax check)
        run: python -m compileall -q miniagent

      - name: Ruff
        run: python -m ruff check miniagent tests

      - name: Pytest
        run: python -m pytest tests/ -q -m "not evaluation"

  test-mcp-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with MCP extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Smoke import MCP SDK
        run: python -c "from mcp import ClientSession, StdioServerParameters; from mcp.client.stdio import stdio_client"

      - name: Compileall (syntax check)
        run: python -m compileall -q miniagent

      - name: Ruff
        run: python -m ruff check miniagent tests

      - name: Pytest
        run: python -m pytest tests/ -q -m "not evaluation"
