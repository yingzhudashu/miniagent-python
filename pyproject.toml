[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "miniagent-python"
dynamic = ["version"]
description = "A minimal LLM agent with two-phase planning, skill system, self-optimization, and Feishu integration"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "yingzhudashu"}
]
keywords = ["llm", "agent", "react", "tool-calling", "feishu"]

dependencies = [
    "openai>=1.0.0",
    "python-dotenv>=1.0.0",
    "aiohttp>=3.9.0",
    "httpx>=0.25.0",
    "websockets>=12.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
feishu = [
    "lark-oapi>=1.4.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.1.0",
]

[project.scripts]
miniagent = "miniagent.cli.cli:main"

[tool.setuptools.dynamic]
version = {attr = "miniagent.__version__"}

[tool.setuptools.packages.find]
where = ["."]
include = ["miniagent*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py310"
line-length = 100
